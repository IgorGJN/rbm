<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegação Simples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 18px;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: 2px solid white;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Estilo Botão 1 */
        .btn-info:hover {
            background-color: white;
            color: #764ba2;
            transform: translateY(-3px);
        }

        /* Estilo Botão 2 */
        .btn-calc:hover {
            background-color: #1abc9c;
            border-color: #1abc9c;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>O que deseja acessar?</h1>
        
        <div class="button-group">
            <a href="informativos/" class="btn btn-info">Informativo</a>
            
            <a href="calculos/" class="btn btn-calc">Cálculos</a>
        </div>
    </div>

</body>
</html>
